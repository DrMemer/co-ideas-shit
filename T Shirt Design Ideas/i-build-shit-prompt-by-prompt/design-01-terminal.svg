  <!-- Main text below -->
  <text x="250" y="310" font-size="13" fill="#30d158" text-anchor="middle" letter-spacing="1">I BUILD SHIT</text>
  <text x="250" y="328" font-size="9" fill="#8b949e" text-anchor="middle">shit Prompt by Prompt</text>
