<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Design 12 — Nutrition Facts</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
<style>
body{margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#e8e8e8;font-family:'Inter',sans-serif}
.label{background:#fff;border:1.5px solid #111;padding:12px 14px;max-width:320px;width:100%}
h1{font-size:36px;font-weight:900;color:#111;line-height:1;margin:0 0 4px}
.serving{font-size:12px;color:#111;margin-bottom:4px}
.thick{height:9px;background:#111;margin:6px 0 4px}
.cal-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px}
.cal-label{font-size:13px;font-weight:900;color:#111}
.cal-val{font-size:32px;font-weight:900;color:#111;line-height:1}
.medium{height:4px;background:#111;margin:4px 0}
.thin{border-top:.5px solid #aaa}
.row{display:flex;justify-content:space-between;font-size:12px;color:#111;padding:4px 0}
.row.indent{padding-left:14px}
.dv{font-size:11px;color:#555;text-align:right;margin-bottom:4px}
.footnote{font-size:11px;color:#666;line-height:1.6;margin-top:6px}
</style></head><body>
<div class="label">
  <h1>Nutrition Facts</h1>
  <div class="serving">Serving size: 1 Prompt &nbsp;·&nbsp; Servings per build: ∞</div>
  <div class="thick"></div>
  <div class="cal-row">
    <div class="cal-label">Calories</div>
    <div class="cal-val">0</div>
  </div>
  <div class="medium"></div>
  <div class="dv">% Daily Value*</div>
  <div class="thin"><div class="row"><span><b>Total Prompts</b> ∞g</span><span><b>∞%</b></span></div></div>
  <div class="thin"><div class="row indent"><span>Shipped Code 100g</span><span>∞%</span></div></div>
  <div class="thin"><div class="row"><span><b>Tests Written</b> 0g</span><span><b>0%</b></span></div></div>
  <div class="thin"><div class="row"><span><b>Documentation</b> 0g</span><span><b>0%</b></span></div></div>
  <div class="thin"><div class="row"><span><b>Planning</b> 0g</span><span><b>0%</b></span></div></div>
  <div class="thin"><div class="row"><span><b>Total Vibes</b> ∞g</span><span><b>100%</b></span></div></div>
  <div class="medium"></div>
  <div class="footnote">*Percent Daily Values based on building shit prompt by prompt. Your daily shit may vary.</div>
</div>
</body></html>
