<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Design 13 — Ransom Note</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@700&family=Bebas+Neue&family=Abril+Fatface&family=Permanent+Marker&family=Rock+Salt&family=Courier+Prime:wght@700&display=swap" rel="stylesheet">
<style>
body{margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#2a2a2a}
.note{background:#f8f4e8;padding:40px 36px;max-width:500px;width:100%;display:flex;flex-direction:column;align-items:center;gap:18px;border:.5px solid #d4c89a}
.line1,.line2{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:center}
.footer{font-family:'Courier Prime',monospace;font-size:13px;color:#bbb;margin-top:8px;letter-spacing:1px}
</style></head><body>
<div class="note">
  <div class="line1">
    <span style="font-family:'Abril Fatface',serif;font-size:52px;color:#111;transform:rotate(-3deg);display:inline-block;background:#ffe066;padding:2px 8px">I</span>
    <span style="font-family:'Rock Salt',cursive;font-size:26px;color:#fff;background:#222;padding:5px 12px;transform:rotate(2deg);display:inline-block">BUILD</span>
    <span style="font-family:'Permanent Marker',cursive;font-size:46px;color:#cc2200;transform:rotate(-2deg);display:inline-block;border-bottom:3px solid #cc2200">SHIT</span>
  </div>
  <div class="line2">
    <span style="font-family:'Space Mono',monospace;font-size:14px;font-weight:700;color:#fff;background:#0a66c2;padding:4px 10px;transform:rotate(1deg);display:inline-block">PROMPT</span>
    <span style="font-family:'Abril Fatface',serif;font-size:24px;color:#333;background:#f0c060;padding:2px 10px;transform:rotate(-2deg);display:inline-block">BY</span>
    <span style="font-family:'Bebas Neue',sans-serif;font-size:44px;color:#fff;background:#cc2200;padding:0 12px;transform:rotate(1.5deg);display:inline-block;letter-spacing:2px">PROMPT</span>
  </div>
  <div class="footer">do not reply to this message</div>
</div>
</body></html>
