<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Design 09 — Arcade</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
body{margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#000}
.shirt{background:#000;padding:30px;max-width:420px;width:100%;box-sizing:border-box;text-align:center;font-family:'Press Start 2P',monospace;border:1px solid #111}
.game-over{font-size:24px;color:#ff0044;line-height:1.6;margin-bottom:20px}
.score-label{font-size:12px;color:#ffcc00;line-height:2;margin-bottom:6px}
.score-val{font-size:22px;color:#fff;margin-bottom:20px}
.high-scores{border-top:1px solid #1a1a1a;padding-top:16px;font-size:12px;color:#00ffcc;line-height:2.5}
.row{display:flex;justify-content:space-between}
.pts{color:#ffcc00}
.tagline{margin-top:20px;font-size:12px;color:#ff0044;line-height:2}
.sub{font-size:12px;color:#222;margin-top:4px}
</style></head><body>
<div class="shirt">
  <div class="game-over">GAME<br>OVER</div>
  <div class="score-label">FINAL SCORE</div>
  <div class="score-val">∞∞∞∞∞</div>
  <div class="high-scores">
    <div class="row"><span>SHIT_BUILD_01</span><span class="pts">∞</span></div>
    <div class="row"><span>PROMPT_BOY</span><span class="pts">9999</span></div>
    <div class="row"><span>NO_DESIGN_DOC</span><span class="pts">9998</span></div>
    <div class="row"><span>SHIPPED_ANYWAY</span><span class="pts">9997</span></div>
  </div>
  <div class="tagline">I BUILD SHIT</div>
  <div class="sub">PROMPT BY PROMPT</div>
</div>
</body></html>
