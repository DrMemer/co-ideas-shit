<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Design 10 — Startup Pitch</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&family=Inter:wght@100;400;900&display=swap" rel="stylesheet">
<style>
body{margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f0f0f0}
.shirt{background:#fff;padding:40px;max-width:600px;width:100%;box-sizing:border-box;border:.5px solid #e0e0e0}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;margin-bottom:28px}
.block .kicker{font-family:'Inter',sans-serif;font-size:12px;color:#ccc;letter-spacing:4px;margin-bottom:10px}
.block .value{font-family:'Inter',sans-serif;font-size:26px;font-weight:900;color:#111;line-height:1.1}
.block .value.bebas{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:1px}
.footer{border-top:.5px solid #eee;padding-top:14px;font-family:'Space Mono',monospace;font-size:12px;color:#ddd;text-align:center;letter-spacing:2px;line-height:1.8}
</style></head><body>
<div class="shirt">
  <div class="grid">
    <div class="block">
      <div class="kicker">PROBLEM</div>
      <div class="value">Everything.</div>
    </div>
    <div class="block">
      <div class="kicker">SOLUTION</div>
      <div class="value bebas">I BUILD SHIT.</div>
    </div>
    <div class="block">
      <div class="kicker">TRACTION</div>
      <div class="value">Already shipped.</div>
    </div>
    <div class="block">
      <div class="kicker">ASK</div>
      <div class="value">One more prompt.</div>
    </div>
  </div>
  <div class="footer">
    PROMPT BY PROMPT &nbsp;·&nbsp; SERIES SEED: NEVER &nbsp;·&nbsp; RUNWAY: ONE MORE PROMPT &nbsp;·&nbsp; DECK: 0 SLIDES
  </div>
</div>
</body></html>
