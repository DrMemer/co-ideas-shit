<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Design 08 — Cassette</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
body{margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0a0a0a}
.shirt{background:#111;padding:24px;max-width:420px;width:100%;box-sizing:border-box}
.cassette{background:#1e1e1e;border:1.5px solid #3a3a3a;border-radius:8px;padding:20px}
.window{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.line{flex:1;height:1.5px;background:#2a2a2a}
.reels{background:#0a0a0a;border:1px solid #333;padding:12px 20px;border-radius:4px;display:flex;gap:22px}
.reel{width:26px;height:26px;border-radius:50%;border:1.5px solid #555;display:flex;align-items:center;justify-content:center}
.reel-inner{width:8px;height:8px;border-radius:50%;background:#2a2a2a}
.label{background:#f5e8c0;padding:16px;border-radius:2px}
.label h2{font-family:'Bebas Neue',sans-serif;font-size:30px;color:#1a1a1a;letter-spacing:2px;margin:0 0 4px}
.label .side{font-family:'Space Mono',monospace;font-size:12px;color:#888;letter-spacing:1px;margin-bottom:12px}
.tracks{border-top:.5px solid #c8b890;padding-top:10px;font-family:'Space Mono',monospace;font-size:12px;color:#555;line-height:2.1}
.sideb{text-align:center;margin-top:14px;font-family:'Space Mono',monospace;font-size:12px;color:#3a3a3a}
</style></head><body>
<div class="shirt">
  <div class="cassette">
    <div class="window">
      <div class="line"></div>
      <div class="reels">
        <div class="reel"><div class="reel-inner"></div></div>
        <div class="reel"><div class="reel-inner"></div></div>
      </div>
      <div class="line"></div>
    </div>
    <div class="label">
      <h2>I BUILD SHIT</h2>
      <div class="side">SIDE A — PROMPT BY PROMPT</div>
      <div class="tracks">
        1. prompt_01.sh ........... 0:∞<br>
        2. debug_forever ......... ∞:∞<br>
        3. ship_it_anyway ...... 0:01<br>
        4. no_tests_lgtm ..... still fine
      </div>
    </div>
    <div class="sideb">SIDE B: THE SHIT CONTINUES</div>
  </div>
</div>
</body></html>
