<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Design 07 — Warning Label</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&family=Inter:wght@900&display=swap" rel="stylesheet">
<style>
body{margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#1a1a1a}
.shirt{background:#ffcc00;padding:20px;border:5px solid #111;max-width:420px;width:100%;box-sizing:border-box}
.inner{border:2.5px solid #111;padding:20px;text-align:center}
.caution{font-family:'Space Mono',monospace;font-size:13px;color:#111;letter-spacing:5px;margin-bottom:12px}
.triangle{width:60px;height:60px;border:3px solid #111;transform:rotate(45deg);margin:0 auto 16px;display:flex;align-items:center;justify-content:center}
.bang{transform:rotate(-45deg);font-family:'Inter',sans-serif;font-size:32px;font-weight:900;color:#111;line-height:1}
.warning{font-family:'Bebas Neue',sans-serif;font-size:52px;color:#111;line-height:1;letter-spacing:3px}
.contents{text-align:left;font-family:'Space Mono',monospace;font-size:12px;color:#111;line-height:2.2;border-top:2px solid #111;border-bottom:2px solid #111;padding:12px 0;margin:16px 0}
.tagline{font-family:'Bebas Neue',sans-serif;font-size:20px;color:#111;letter-spacing:3px}
</style></head><body>
<div class="shirt">
  <div class="inner">
    <div class="caution">CAUTION</div>
    <div class="triangle"><div class="bang">!</div></div>
    <div class="warning">WARNING</div>
    <div class="contents">
      CONTENTS: PURE SHIT<br>
      METHOD: VIBES + PROMPTS<br>
      SIDE EFFECTS: IT WORKS SOMEHOW<br>
      NO DOCS INCLUDED<br>
      KEEP AWAY FROM: PMs, SCRUM
    </div>
    <div class="tagline">I BUILD SHIT · PROMPT BY PROMPT</div>
  </div>
</div>
</body></html>
